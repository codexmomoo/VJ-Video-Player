<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08080e">
    <meta property="og:title" content="%s | CodeX OTT">
    <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png">
    <title>%s | CodeX OTT</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.6.9/plyr.css"/>
    <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
        background:#08080e;
        color:#e8e8f0;
        font-family:'Exo 2',sans-serif;
        min-height:100vh;
        display:flex;
        flex-direction:column;
    }
    /* BG */
    body::before{
        content:'';position:fixed;inset:0;
        background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(229,9,20,0.08),transparent 60%);
        pointer-events:none;z-index:0;
    }

    /* NAV */
    nav{
        position:sticky;top:0;z-index:100;
        background:rgba(8,8,14,0.95);
        backdrop-filter:blur(20px);
        border-bottom:1px solid rgba(255,255,255,0.07);
        padding:0 16px;height:56px;
        display:flex;align-items:center;justify-content:space-between;
    }
    .nav-brand{
        font-family:'Bebas Neue',cursive;
        font-size:20px;letter-spacing:4px;color:#fff;
        text-decoration:none;
    }
    .nav-brand span{color:#e50914}
    .nav-tag{
        font-family:'Rajdhani',sans-serif;
        font-size:10px;font-weight:700;letter-spacing:2px;
        color:#7777aa;background:rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.07);
        padding:3px 10px;border-radius:20px;
    }

    /* MAIN */
    main{
        flex:1;position:relative;z-index:1;
        padding:24px 16px 40px;
        max-width:560px;margin:0 auto;width:100%;
        display:flex;flex-direction:column;gap:16px;
    }

    /* FILE INFO CARD */
    .file-card{
        background:#111118;
        border:1px solid rgba(255,255,255,0.07);
        border-radius:16px;
        padding:18px 16px;
        display:flex;align-items:center;gap:14px;
    }
    .file-ico{
        width:46px;height:46px;
        background:rgba(229,9,20,0.1);
        border:1px solid rgba(229,9,20,0.2);
        border-radius:12px;
        display:flex;align-items:center;justify-content:center;
        flex-shrink:0;
    }
    .file-ico svg{color:#e50914}
    .file-details{flex:1;min-width:0}
    .file-name{
        font-family:'Rajdhani',sans-serif;
        font-size:14px;font-weight:700;
        color:#fff;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
        margin-bottom:4px;
    }
    .file-meta{
        font-family:'Exo 2',sans-serif;
        font-size:11px;color:#7777aa;letter-spacing:1px;
    }
    .file-size{
        font-family:'Bebas Neue',cursive;
        font-size:15px;letter-spacing:2px;
        color:#f5c518;flex-shrink:0;
    }

    /* DOWNLOAD BTN */
    .dl-btn{
        display:flex;align-items:center;justify-content:space-between;
        padding:16px 18px;
        background:linear-gradient(135deg,rgba(229,9,20,0.12),rgba(229,9,20,0.04));
        border:1px solid rgba(229,9,20,0.3);
        border-radius:14px;
        text-decoration:none;
        cursor:pointer;
        transition:all 0.25s;
        position:relative;overflow:hidden;
    }
    .dl-btn:active{transform:scale(0.97)}
    .dl-btn::before{
        content:'';position:absolute;inset:0;
        background:linear-gradient(135deg,rgba(229,9,20,0.06),transparent);
        opacity:0;transition:opacity 0.3s;
    }
    .dl-btn:hover::before{opacity:1}
    .dl-btn-left{display:flex;align-items:center;gap:14px}
    .dl-btn-ico{
        width:44px;height:44px;
        background:rgba(229,9,20,0.15);
        border-radius:12px;
        display:flex;align-items:center;justify-content:center;
        flex-shrink:0;
    }
    .dl-btn-ico svg{color:#e50914}
    .dl-btn-info{display:flex;flex-direction:column;gap:3px}
    .dl-btn-title{
        font-family:'Rajdhani',sans-serif;
        font-size:15px;font-weight:700;color:#fff;
    }
    .dl-btn-sub{
        font-family:'Exo 2',sans-serif;
        font-size:11px;color:rgba(232,232,240,0.4);
    }
    .dl-arrow{
        color:#e50914;font-size:22px;
        font-family:'Bebas Neue',cursive;
    }

    /* SIZE BADGE */
    .size-badge{
        display:inline-flex;align-items:center;gap:6px;
        background:rgba(245,197,24,0.08);
        border:1px solid rgba(245,197,24,0.2);
        border-radius:20px;padding:4px 12px;
        font-family:'Rajdhani',sans-serif;
        font-size:11px;font-weight:700;
        color:#f5c518;letter-spacing:1px;
        align-self:flex-start;
    }

    /* INFO BOX */
    .info-box{
        background:#111118;
        border:1px solid rgba(255,255,255,0.05);
        border-radius:14px;
        padding:14px 16px;
        display:flex;align-items:flex-start;gap:10px;
    }
    .info-box svg{color:#7777aa;flex-shrink:0;margin-top:1px}
    .info-box-txt{
        font-family:'Exo 2',sans-serif;
        font-size:11px;color:#7777aa;line-height:1.7;
    }

    /* FOOTER */
    footer{
        position:relative;z-index:1;
        border-top:1px solid rgba(255,255,255,0.05);
        padding:16px;text-align:center;
    }
    .footer-brand{
        font-family:'Bebas Neue',cursive;
        font-size:11px;letter-spacing:4px;
        color:rgba(255,255,255,0.15);
    }
    .footer-brand span{color:rgba(229,9,20,0.4)}

    /* ripple */
    @keyframes rippleAnim{0%{transform:scale(0);opacity:0.4}100%{transform:scale(4);opacity:0}}
    .ripple-circle{
        position:absolute;border-radius:50%;
        background:rgba(255,255,255,0.12);
        pointer-events:none;
        animation:rippleAnim 0.5s ease-out forwards;
        width:80px;height:80px;
        margin-left:-40px;margin-top:-40px;z-index:99;
    }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" href="https://t.me/CODExMOMO"><span>CODE</span>X OTT</a>
    <div class="nav-tag">STREAM SERVER</div>
</nav>

<main>
    <!-- File Info -->
    <div class="file-card">
        <div class="file-ico">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/>
            </svg>
        </div>
        <div class="file-details">
            <div class="file-name" id="fileName">%s</div>
            <div class="file-meta">CodeX OTT &nbsp;·&nbsp; Tap below to download</div>
        </div>
        <div class="file-size">%s</div>
    </div>

    <!-- Size badge -->
    <div class="size-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        %s
    </div>

    <!-- Download Button -->
    <a class="dl-btn" href="%s">
        <div class="dl-btn-left">
            <div class="dl-btn-ico">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <div class="dl-btn-info">
                <div class="dl-btn-title">Download File</div>
                <div class="dl-btn-sub">Tap to start downloading</div>
            </div>
        </div>
        <div class="dl-arrow">›</div>
    </a>

    <!-- Info -->
    <div class="info-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div class="info-box-txt">This link is generated by CodeX OTT Stream Server. If the download doesn't start, try opening in a different browser or tap the button again.</div>
    </div>
</main>

<footer>
    <div class="footer-brand">POWERED BY <span>CODEXMOMO</span> &nbsp;·&nbsp; FAN MADE</div>
</footer>

<script src="https://cdn.plyr.io/3.6.12/plyr.js"></script>
<script>
// Ripple
document.addEventListener('touchstart', function(e){
    const el = e.target.closest('a,button,[onclick]');
    if(!el) return;
    el.style.position = el.style.position||'relative';
    el.style.overflow = 'hidden';
    const rect = el.getBoundingClientRect();
    const t = e.touches[0];
    const c = document.createElement('span');
    c.className='ripple-circle';
    c.style.left=(t.clientX-rect.left)+'px';
    c.style.top=(t.clientY-rect.top)+'px';
    el.appendChild(c);
    c.addEventListener('animationend',()=>c.remove(),{once:true});
},{passive:true});

// Trim filename
const fn = document.getElementById('fileName');
if(fn && fn.textContent.length > 55){
    fn.textContent = fn.textContent.slice(0,55)+'...';
}
</script>
</body>
</html>
